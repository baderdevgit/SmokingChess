<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pressure Monitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Times New Roman', Times, serif; background: #fff; color: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
    .grid { display: flex; justify-content: center; gap: 2rem; width: 100%; }
    .sensor { display: flex; flex-direction: column; gap: 0.5rem; width: 400px; }
    .sensor-name { font-size: 40px; font-weight: 400; color: #000000; }
    .sensor-value { font-size: 20px; font-weight: 400; color: #111; }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #000000; margin-right: 6px; vertical-align: middle; }
    .dot.live { animation: pulse 1.5s infinite; }
    .chart-wrap { position: relative; width: 100%; height: 260px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
  </style>
</head>
<body>
  <div class="grid" id="grid"></div>

  <script>
    const WINDOW = 10;
    const BUFFER = 500;
    const COLORS = ['#E8821A', '#1D9E75', '#7F77DD', '#E05C5C'];
    const PLAYER_NAMES = ['player 1', 'player 2', 'player 3', 'player 4'];

    const devices = {};
    let startTime = null;

    function createDevice(deviceId) {
      const index = Object.keys(devices).length;
      const color = COLORS[index % COLORS.length];
      const playerName = PLAYER_NAMES[index % PLAYER_NAMES.length];

      const col = document.createElement('div');
      col.className = 'sensor';
      col.innerHTML = `
        <!--<div class="sensor-name">${playerName}</div>-->
        
        <div class="chart-wrap">
          <canvas id="chart-${deviceId}" role="img" aria-label="suction waveform for ${playerName}"></canvas>
        </div>
        <div class="sensor-value" id="val-${deviceId}">smoking pressure: </div>
        <div class="sensor-value" id="duration-${deviceId}">duration: 0.0s</div>
      `;

      document.getElementById('grid').appendChild(col);

      const ctx = document.getElementById('chart-' + deviceId).getContext('2d');
      const chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [{ data: [], borderColor: color, borderWidth: 1.5, pointRadius: 0, tension: 0, fill: false }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.parsed.y.toFixed(1) + '%' } } },
          scales: {
            x: {
              display: true,
              ticks: { display: false },
              grid: { color: 'rgba(0,0,0,0.15)', drawTicks: false },
              border: { color: '#111' }
            },
            y: {
              min: 0, max: 100,
              ticks: {
                color: '#111',
                font: { family: 'Times New Roman', size: 10 },
                stepSize: 25,
                callback: v => v + '%'
              },
              grid: { color: 'rgba(0,0,0,0.15)' },
              border: { color: '#111' }
            }
          }
        }
      });

      devices[deviceId] = { chart, color, allData: [], lastSeen: null };
      return devices[deviceId];
    }

    function pushReading(deviceId, norm, duration) {
      if (!devices[deviceId]) createDevice(deviceId);
      const dev = devices[deviceId];

      if (startTime === null) startTime = Date.now();

      dev.allData.push(norm);
      if (dev.allData.length > BUFFER) dev.allData.shift();

      const slice = dev.allData.slice(-WINDOW);
      dev.chart.data.labels = Array.from({ length: WINDOW }, (_, i) => i);
      dev.chart.data.datasets[0].data = slice;
      dev.chart.update('none');

      document.getElementById('val-' + deviceId).textContent = 'smoking pressure: ' + (norm < 1 ? (0).toFixed() : norm.toFixed(1)) + '%';
      dev.lastSeen = Date.now();

      const durEl = document.getElementById('duration-' + deviceId);
      if (durEl && duration !== undefined) {
        durEl.textContent = 'duration: ' + duration.toFixed(1) + 's';
      }
    }

    const socket = io();
    socket.on('sensor-update', (state) => {
      for (const deviceId in state) {
        const norm = state[deviceId]?.norm;
        const duration = state[deviceId]?.duration;
        if (norm !== undefined) pushReading(deviceId, norm, duration);
      }
    });
  </script>
</body>
</html>

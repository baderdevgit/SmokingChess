<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IoT Dashboard</title>
</head>
<body>
  <h1>IoT Dashboard</h1>
  <pre id="state">Waiting for data...</pre>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    socket.on("sensor-update", (state) => {
      document.getElementById("state").textContent = JSON.stringify(state, null, 2);
    });
  </script>
</body>
</html>
